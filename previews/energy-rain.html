<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Rain Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      overflow: hidden;
      min-height: 100vh;
      font-family: "Trebuchet MS", sans-serif;
      color: white;
      background:
        linear-gradient(rgba(3, 8, 24, 0.32), rgba(8, 4, 24, 0.44)),
        url("../gamingxx.jpg") center center / cover no-repeat;
    }
    .stage {
      position: fixed;
      inset: 0;
    }
    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 70%, rgba(0, 255, 255, 0.14), transparent 24%),
        radial-gradient(circle at 80% 24%, rgba(255, 0, 153, 0.16), transparent 20%);
    }
    .beam {
      position: absolute;
      top: -28vh;
      width: 2px;
      height: 34vh;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(126,240,255,0.95), rgba(255,255,255,0));
      box-shadow: 0 0 14px rgba(126, 240, 255, 0.55);
      animation: rain linear infinite;
      opacity: 0.72;
    }
    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 14px rgba(255,255,255,0.8);
      animation: spark linear infinite;
    }
    .content {
      position: relative;
      z-index: 3;
      height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 32px;
    }
    .label {
      display: inline-flex;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(8, 12, 25, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.2em;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(44px, 8vw, 90px);
      line-height: 0.95;
      max-width: 900px;
      text-shadow: 0 8px 30px rgba(0,0,0,0.45);
    }
    p {
      margin-top: 16px;
      max-width: 720px;
      font-size: 20px;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
    }
    @keyframes rain {
      0% { transform: translate3d(0, 0, 0); opacity: 0; }
      15% { opacity: 0.9; }
      100% { transform: translate3d(0, 140vh, 0); opacity: 0; }
    }
    @keyframes spark {
      0% { transform: translate3d(0, 0, 0) scale(0.4); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translate3d(0, 120vh, 0) scale(1.2); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="content">
    <div>
      <div class="label">Option 2</div>
      <h1>Energy Rain</h1>
      <p>Vertical neon streaks fall through the background like a futuristic arena effect while your wallpaper still stays visible behind them.</p>
    </div>
  </div>
  <script>
    var stage = document.getElementById("stage");
    for (var i = 0; i < 32; i += 1) {
      var beam = document.createElement("span");
      beam.className = "beam";
      beam.style.left = Math.random() * 100 + "%";
      beam.style.animationDuration = 3 + Math.random() * 4 + "s";
      beam.style.animationDelay = -Math.random() * 8 + "s";
      beam.style.transform = "rotate(" + (-10 + Math.random() * 20) + "deg)";
      stage.appendChild(beam);
    }
    for (var j = 0; j < 34; j += 1) {
      var spark = document.createElement("span");
      spark.className = "spark";
      spark.style.left = Math.random() * 100 + "%";
      spark.style.top = Math.random() * 100 + "%";
      spark.style.animationDuration = 2.6 + Math.random() * 2.2 + "s";
      spark.style.animationDelay = -Math.random() * 6 + "s";
      stage.appendChild(spark);
    }
  </script>
</body>
</html>
